<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Temperature Converter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1 id="head">Temperature Converter</h1>
    <div id="fullControl">
      <input id="input" type="number" placeholder="Enter the Temperature" min="0" />

      <div class="radioButtons">
        <input id="celsiusBtn" type="radio" name="radioButtons" />Fahrenheit → Celsius <br />
        <input id="fahrenheitBtn" type="radio" name="radioButtons" />Celsius → Fahrenheit
      </div>
      <button id="button" onclick="execute()">Submit</button>
      <p id="result"></p>
    </div>
    <script src="index.js"></script>
  </body>
</html>
